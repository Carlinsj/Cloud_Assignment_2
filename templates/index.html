<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>
    <h1>To-Do List</h1>

    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li>
                {{ todo["task"] }}
                <a href="/delete/{{ todo["_id"] }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
